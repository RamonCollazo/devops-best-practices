apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-controllers
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/monitoring/controllers/aws/staging
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: infrastructure-configs
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-configs
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/monitoring/configs/aws/staging
  prune: true
  wait: true
  timeout: 5m
  dependsOn:
    - name: monitoring-controllers
