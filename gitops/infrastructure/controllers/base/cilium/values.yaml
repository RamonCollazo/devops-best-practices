eni:
  enabled: true

ipam:
  mode: eni

kubeProxyReplacement: true
# k8sServiceHost is the EKS API server endpoint without https://.
# Patched in the aws/staging overlay after cluster creation.
k8sServiceHost: ""
k8sServicePort: 443

gatewayAPI:
  enabled: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
