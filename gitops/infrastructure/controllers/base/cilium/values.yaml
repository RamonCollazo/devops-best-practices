eni:
  enabled: true

ipam:
  mode: eni

kubeProxyReplacement: true
# Injected at reconcile time from the cluster-vars ConfigMap via Flux postBuild substitution.
k8sServiceHost: "${k8sServiceHost}"
k8sServicePort: 443

gatewayAPI:
  enabled: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
