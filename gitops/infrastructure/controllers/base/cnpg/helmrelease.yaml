apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: flux-system
spec:
  targetNamespace: cnpg-system
  interval: 10m
  chart:
    spec:
      chart: cloudnative-pg
      version: '0.27.1'
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: cnpg-values
      valuesKey: values.yaml
