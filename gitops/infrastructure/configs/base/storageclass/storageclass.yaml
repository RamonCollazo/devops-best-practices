apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-encrypted
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"  # used by all PVCs that don't specify a class
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "3000"       # gp3 baseline; can be raised independently of volume size (unlike gp2)
  throughput: "125"  # MiB/s baseline
  encrypted: "true"  # AES-256 encryption via AWS-managed key
reclaimPolicy: Delete          # PVC deletion also deletes the EBS volume
volumeBindingMode: WaitForFirstConsumer  # volume is created in the same AZ as the pod; avoids cross-AZ attachment
allowVolumeExpansion: true
