apiVersion: v1
kind: Namespace
metadata:
  name: acme
  labels:
    # Allows HTTPRoutes in this namespace to attach to the shared-gateway.
    shared-gateway: "true"
    # Pod Security Admission - enforce the restricted profile so every pod in this
    # namespace must declare non-root user, drop all capabilities, disable privilege
    # escalation, and use a RuntimeDefault seccomp profile. warn and audit surface
    # violations from higher-level controllers (Deployments) before they reach enforce.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
