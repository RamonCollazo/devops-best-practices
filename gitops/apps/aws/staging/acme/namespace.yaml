apiVersion: v1
kind: Namespace
metadata:
  name: acme
  labels:
    # Allows HTTPRoutes in this namespace to attach to the shared-gateway Gateway.
    shared-gateway: "true"
    # PSA restricted profile: blocks privilege escalation, host namespaces, and non-root containers.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
