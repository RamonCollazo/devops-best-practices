apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-app-egress-https
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  egress:
    # Allow HTTPS egress for application workloads that call external APIs.
    # toEntities: [world] covers all destinations outside the cluster boundary.
    # The Pod Identity credential endpoint (169.254.170.23) uses link-local
    # addressing which is outside NetworkPolicy scope and is always reachable.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
