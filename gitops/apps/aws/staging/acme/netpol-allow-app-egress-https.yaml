apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-app-egress-https
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  egress:
    # n8n calls external APIs and webhooks over HTTPS.
    # Future: replace toEntities: world with toFQDNs rules to restrict to specific hostnames.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
