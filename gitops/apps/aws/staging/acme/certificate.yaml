apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: acme-tls
  # Must be in the same namespace as the Gateway so the secret is accessible.
  namespace: shared-gateway
spec:
  secretName: acme-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - acme.raymondcollazo.com
