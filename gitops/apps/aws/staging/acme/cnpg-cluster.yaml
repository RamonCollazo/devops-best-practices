apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: acme-db
  namespace: acme
spec:
  # 1 instance for staging; increase to 3 for production HA.
  instances: 1

  storage:
    size: 5Gi
    # Explicit storage class - avoids dependency on a default storage class being set.
    storageClass: gp2

  bootstrap:
    initdb:
      database: n8n
      owner: n8n
      # Secret is created by the CSI driver when the n8n pod first mounts the volume.
      # CNPG retries until the secret exists - no ordering hack needed.
      secret:
        name: acme-db-credentials

  # Barman Cloud plugin for WAL archiving and base backups to S3.
  # The ObjectStore resource (acme-backup-store) defines the destination and credentials.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: acme-backup-store
