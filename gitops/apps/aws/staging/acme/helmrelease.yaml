apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: acme
spec:
  interval: 10m
  chart:
    spec:
      chart: n8n
      version: "1.16.29"
      sourceRef:
        kind: HelmRepository
        name: community-charts
        namespace: acme
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: n8n-values
      valuesKey: values.yaml
