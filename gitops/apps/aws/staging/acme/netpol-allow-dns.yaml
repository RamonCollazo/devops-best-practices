apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns
  namespace: acme
spec:
  # All pods in the namespace need DNS resolution.
  # Cilium injects io.kubernetes.pod.namespace into every endpoint identity,
  # so fromEndpoints/toEndpoints can match by namespace without a separate
  # namespaceSelector. Both labels in the matchLabels entry are ANDed,
  # selecting only kube-dns pods inside kube-system.
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
