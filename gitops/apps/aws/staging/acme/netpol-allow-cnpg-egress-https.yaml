apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-egress-https
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: acme-db
  egress:
    # CNPG (Barman plugin) writes WAL and base backups to S3 over HTTPS.
    # Future: replace toEntities: world with toFQDNs rules targeting the S3 endpoint.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
