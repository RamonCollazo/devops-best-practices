apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-egress-https
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: acme-db
  egress:
    # CNPG Barman plugin calls the S3 API over HTTPS to write WAL segments
    # and base backups. toEntities: [world] covers all destinations outside
    # the cluster boundary. Pod Identity credentials are exchanged via
    # link-local (169.254.170.23) which is outside NetworkPolicy scope.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
