apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-n8n-ingress-to-db
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: acme-db
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: n8n
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
