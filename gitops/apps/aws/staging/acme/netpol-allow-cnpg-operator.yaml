apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: acme
spec:
  # Allow the CNPG operator (running in cnpg-system) to reach the instance manager
  # HTTP API on port 8000 of each PostgreSQL pod. The operator uses this endpoint
  # for health checks, status extraction, and lifecycle management. Without this
  # policy the default-deny rule blocks the operator and causes "HTTP communication
  # issue" errors on the Cluster resource.
  podSelector:
    matchLabels:
      cnpg.io/cluster: acme-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000
