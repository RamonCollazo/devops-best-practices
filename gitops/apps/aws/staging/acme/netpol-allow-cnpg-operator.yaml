apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: acme-db
  ingress:
    # CNPG operator (in cnpg-system) reaches into customer namespaces on port 8000
    # for health checks, webhook calls, and cluster reconciliation.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
