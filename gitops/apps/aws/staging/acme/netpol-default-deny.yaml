apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny
  namespace: acme
spec:
  # Empty selector matches all pods in the namespace.
  endpointSelector: {}
  # Empty rule lists mean: match nothing. Combined with the selector above, this establishes
  # a default-deny baseline for all ingress and egress in the namespace.
  # All allowed traffic must be explicitly permitted by other policies.
  ingress:
    - {}
  egress:
    - {}
