apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny
  namespace: acme
spec:
  # Empty endpointSelector matches every pod in the namespace.
  # A single empty rule {} enables policy enforcement on both directions
  # without matching any traffic, effectively denying all flows not
  # explicitly allowed by subsequent policies.
  endpointSelector: {}
  ingress:
    - {}
  egress:
    - {}
