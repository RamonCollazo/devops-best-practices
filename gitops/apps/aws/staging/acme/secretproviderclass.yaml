apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: acme-secrets
  namespace: acme
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"  # use Pod Identity for credentials instead of IRSA annotations
    objects: |
      - objectName: "acme-n8n-db-user"
        objectType: secretsmanager
      - objectName: "acme-n8n-db-password"
        objectType: secretsmanager
      - objectName: "acme-n8n-encryption-key"
        objectType: secretsmanager
  # secretObjects are synced as K8s Secrets when a pod mounts this CSI volume.
  # The secrets only exist while at least one pod is mounting the volume.
  secretObjects:
    # acme-db-credentials: used by CNPG as the bootstrap secret for the database owner account.
    - secretName: acme-db-credentials
      type: kubernetes.io/basic-auth
      data:
        - objectName: acme-n8n-db-user
          key: username
        - objectName: acme-n8n-db-password
          key: password
    # acme-n8n-db: used by n8n to connect to PostgreSQL via externalPostgresql.existingSecret.
    - secretName: acme-n8n-db
      type: Opaque
      data:
        - objectName: acme-n8n-db-password
          key: postgres-password  # n8n chart expects this key name regardless of postgresql.enabled
    # acme-n8n-secrets: loaded as envFrom into n8n; key name becomes the environment variable name.
    - secretName: acme-n8n-secrets
      type: Opaque
      data:
        - objectName: acme-n8n-encryption-key
          key: N8N_ENCRYPTION_KEY
