apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: acme-secrets
  namespace: acme
spec:
  provider: aws
  parameters:
    # usePodIdentity delegates credential resolution to the Pod Identity Agent
    # instead of reading the SA's projected OIDC token (IRSA).
    usePodIdentity: "true"
    objects: |
      - objectName: "acme-n8n-db-user"
        objectType: secretsmanager
      - objectName: "acme-n8n-db-password"
        objectType: secretsmanager
      - objectName: "acme-n8n-encryption-key"
        objectType: secretsmanager
  secretObjects:
    # For CNPG bootstrap — type basic-auth, keys: username + password.
    - secretName: acme-db-credentials
      type: kubernetes.io/basic-auth
      data:
        - objectName: acme-n8n-db-user
          key: username
        - objectName: acme-n8n-db-password
          key: password
    # For n8n Helm chart externalPostgresql.existingSecret — key must be "password".
    - secretName: acme-n8n-db
      type: Opaque
      data:
        - objectName: acme-n8n-db-password
          key: password
    # For n8n Helm chart existingEncryptionKeySecret — loaded via envFrom, so the key
    # name becomes the env var name. n8n reads N8N_ENCRYPTION_KEY from the environment.
    - secretName: acme-n8n-secrets
      type: Opaque
      data:
        - objectName: acme-n8n-encryption-key
          key: N8N_ENCRYPTION_KEY
