apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n
  namespace: acme
  # No annotation needed - Pod Identity Agent handles credential injection
  # based on the PodIdentityAssociation created via:
  # make create-pod-identity-association NAMESPACE=acme
# n8n does not call the Kubernetes API; mounting the service account token adds
# attack surface with no benefit. Disable it here and set serviceAccount.create: false
# in the Helm values so this manifest is the single source of truth for the SA.
automountServiceAccountToken: false
