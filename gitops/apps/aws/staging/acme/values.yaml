# Use external CNPG cluster instead of the bundled Bitnami PostgreSQL.
postgresql:
  enabled: false

db:
  type: postgresdb

externalPostgresql:
  host: acme-db-rw   # CNPG read-write service in the same namespace
  port: 5432
  database: n8n
  username: n8n
  # Secret created by the CSI driver when the pod first mounts the volume.
  # The chart reads the "postgres-password" key from this secret.
  existingSecret: acme-n8n-db

# Secret created by CSI driver. Loaded via envFrom - all keys become env vars.
# Key N8N_ENCRYPTION_KEY is read directly by n8n from the environment.
existingEncryptionKeySecret: acme-n8n-secrets

serviceAccount:
  # Managed by serviceaccount.yaml (Kustomize) so we can set automountServiceAccountToken: false.
  # Helm does not support that field, so we own the SA and tell the chart not to create one.
  create: false
  name: n8n

# Pod-level security context applied to all containers in the n8n pod.
# runAsNonRoot + runAsUser match the node user baked into the n8n image (UID 1000).
# seccompProfile RuntimeDefault uses the container runtime's built-in syscall filter.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context.
# allowPrivilegeEscalation: false prevents setuid/setgid binaries from gaining extra rights.
# capabilities.drop: [ALL] removes every Linux capability; n8n is a Node.js app and needs none.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# n8n performs DB migrations on first start which can take 30-60 seconds.
# Without an initial delay the liveness probe kills the container before it is ready.
livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5

# Resource requests and limits prevent a single n8n instance from starving other
# workloads or triggering node eviction. Adjust limits based on workflow load.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Mount the CSI volume to trigger SecretProviderClass reconciliation and K8s Secret
# creation (acme-db-credentials for CNPG, acme-n8n-db and acme-n8n-secrets for n8n).
# emptyDir volumes provide writable scratch space required by readOnlyRootFilesystem: true.
volumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: acme-secrets
  - name: n8n-data
    emptyDir: {}
  - name: n8n-cache
    emptyDir: {}
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: secrets-store
    mountPath: /mnt/secrets-store
    readOnly: true
  - name: n8n-data
    mountPath: /home/node/.n8n
  - name: n8n-cache
    mountPath: /home/node/.cache
  - name: tmp
    mountPath: /tmp
