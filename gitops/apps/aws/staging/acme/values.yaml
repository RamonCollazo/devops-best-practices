# n8n Helm values for the acme customer namespace.
# Uses external PostgreSQL (CNPG cluster acme-db) instead of the bundled PostgreSQL chart.

postgresql:
  enabled: false  # disabled; CNPG manages the database separately

db:
  type: postgresdb

externalPostgresql:
  host: acme-db-rw   # CNPG creates this service pointing to the current primary
  port: 5432
  database: n8n
  username: n8n
  existingSecret: acme-n8n-db  # synced from Secrets Manager by the CSI driver

existingEncryptionKeySecret: acme-n8n-secrets  # contains N8N_ENCRYPTION_KEY, loaded via envFrom

serviceAccount:
  create: false  # service account is managed in serviceaccount.yaml with Pod Identity binding
  name: n8n

# PSA restricted profile requires runAsNonRoot and seccompProfile.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

livenessProbe:
  initialDelaySeconds: 60  # n8n takes ~30–60s to initialize on first start
  periodSeconds: 10
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

volumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: acme-secrets  # triggers secret sync from Secrets Manager on pod start
  # readOnlyRootFilesystem requires writable mounts for every path n8n writes to.
  - name: n8n-data
    emptyDir: {}
  - name: n8n-cache
    emptyDir: {}
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: secrets-store
    mountPath: /mnt/secrets-store
    readOnly: true
  - name: n8n-data
    mountPath: /home/node/.n8n
  - name: n8n-cache
    mountPath: /home/node/.cache
  - name: tmp
    mountPath: /tmp
