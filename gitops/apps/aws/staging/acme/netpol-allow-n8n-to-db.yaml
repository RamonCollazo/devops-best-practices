apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-n8n-to-db
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: acme-db  # matches all CNPG pods (primary and replicas) in this cluster
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
