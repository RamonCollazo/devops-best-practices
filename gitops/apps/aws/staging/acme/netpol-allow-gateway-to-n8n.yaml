apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-n8n
  namespace: acme
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  policyTypes:
    - Ingress
  ingress:
    # Cilium Envoy uses hostNetwork: true, so traffic arrives at n8n with the node
    # IP as source. Neither namespaceSelector nor ipBlock selectors reliably match
    # host-network traffic in Cilium ENI mode (pod IPs are VPC-native; Cilium
    # enforces policy at the eBPF layer before NAT). The port restriction is kept
    # as the primary control; external access to port 5678 is not possible without
    # going through the ELB -> Gateway chain (no NodePort, no hostPort).
    - ports:
        - protocol: TCP
          port: 5678
