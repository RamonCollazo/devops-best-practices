apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-n8n
  namespace: acme
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  policyTypes:
    - Ingress
  ingress:
    # Cilium Gateway API uses an Envoy proxy DaemonSet in kube-system to handle
    # HTTPRoute forwarding. Traffic from the load balancer arrives at the Envoy
    # pod and is proxied to n8n, so the source namespace seen by NetworkPolicy
    # enforcement is kube-system, not shared-gateway.
    # shared-gateway is included to cover direct-forwarding proxy modes.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared-gateway
      ports:
        - protocol: TCP
          port: 5678
