apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-to-n8n
  namespace: acme
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: n8n
  ingress:
    # fromEntities: cluster is required because Cilium Envoy runs with hostNetwork:true in kube-system.
    # Host-network pods share the node's network namespace; Cilium classifies their traffic as the
    # "cluster" entity rather than a namespace-scoped endpoint. Standard namespace selectors cannot match it.
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "5678"
              protocol: TCP
