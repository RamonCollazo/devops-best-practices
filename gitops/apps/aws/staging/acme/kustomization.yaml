apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - secretproviderclass.yaml
  - certificate.yaml
  - cnpg-cluster.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - httproute.yaml
configMapGenerator:
  - name: n8n-values
    namespace: acme
    files:
      - values.yaml=values.yaml
configurations:
  - kustomizeconfig.yaml
