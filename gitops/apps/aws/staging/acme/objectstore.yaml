apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: acme-backup-store
  namespace: acme
spec:
  configuration:
    # ${cnpgBackupBucket} is substituted by Flux from the cluster-vars ConfigMap at reconcile time.
    # Set via: make create-cluster-vars (after make deploy-s3)
    destinationPath: s3://${cnpgBackupBucket}/acme
    # Pod Identity injects short-lived STS credentials into the CNPG pod at runtime.
    # The CnpgBackupRole is bound via: make create-cnpg-backup-association
    s3Credentials:
      inheritFromIAMRole: true
  # Barman deletes base backups and WAL older than 30 days after each successful backup run.
  # Matches NoncurrentVersionExpiration in s3.yaml so older versions are cleaned up together.
  retentionPolicy: "30d"
