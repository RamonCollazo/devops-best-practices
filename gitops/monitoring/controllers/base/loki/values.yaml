# SingleBinary mode: all Loki roles (ingester, querier, distributor) run in one pod.
# Appropriate for staging and low-volume production. Switch to distributed mode for horizontal scaling.
deploymentMode: SingleBinary

loki:
  auth_enabled: false  # single-tenant; all workloads share one Loki instance
  commonConfig:
    replication_factor: 1  # no replication in SingleBinary mode
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13  # v13 enables OTLP-based service detection (service_name label)
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem  # local disk; does not survive pod or node loss. Use S3 for production durability.

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp3-encrypted
    size: 20Gi

# Disable distributed-mode components (not used in SingleBinary).
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable caches to reduce resource usage in SingleBinary mode.
chunksCache:
  enabled: false
resultsCache:
  enabled: false
