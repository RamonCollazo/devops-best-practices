deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp2-encrypted
    size: 20Gi

# Disable distributed-mode components - not needed in SingleBinary mode.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable the built-in Grafana agent (we use Promtail separately).
chunksCache:
  enabled: false
resultsCache:
  enabled: false
