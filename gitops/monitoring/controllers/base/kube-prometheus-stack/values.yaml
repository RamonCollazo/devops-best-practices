grafana:
  additionalDataSources:
    - name: Loki
      type: loki
      # Service name is monitoring-loki because Flux prefixes the Helm release name with the target namespace.
      url: http://monitoring-loki.monitoring.svc.cluster.local:3100
      access: proxy
  persistence:
    enabled: false  # Grafana is stateless; dashboards and config are GitOps-managed via ConfigMaps

prometheus:
  prometheusSpec:
    retention: 15d  # 15 days covers two sprint cycles for incident investigation
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3-encrypted
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3-encrypted
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
