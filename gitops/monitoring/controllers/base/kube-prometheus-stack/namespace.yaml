apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    # Allows HTTPRoutes in this namespace to attach to the shared-gateway.
    shared-gateway: "true"
    # node-exporter and Promtail require hostPID, hostNetwork, and host volume mounts.
    # These are incompatible with restricted or baseline PSA. Use privileged for the
    # monitoring namespace which contains only trusted infrastructure components.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
