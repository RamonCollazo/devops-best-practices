AWSTemplateFormatVersion: '2010-09-09'
Description: IAM roles for IRSA, grants pods cloud permissions without static credentials

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming

  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Deployment environment

  EksStackName:
    Type: String
    Description: Name of the EKS CloudFormation stack to import OIDC values from

Resources:
  # -- Secrets Reader Role --
  # Assumed by app ServiceAccounts (e.g. n8n) via IRSA.
  # The CSI driver reads the pod's projected SA token and exchanges it for AWS credentials.
  # StringLike with wildcard allows any SA named 'n8n' across all customer namespaces
  # without needing one role per customer.
  SecretsReaderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-secrets-reader-role
      AssumeRolePolicyDocument:
        # JSON literal required: YAML drops duplicate keys, so both :sub and :aud conditions
        # must live in one Fn::Sub. Fn::Split strips the https:// prefix from the issuer URL
        # because IAM condition keys expect the bare hostname (no protocol).
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": { "Federated": "${OidcProviderArn}" },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcIssuer}:aud": "sts.amazonaws.com"
                  },
                  "StringLike": {
                    "${OidcIssuer}:sub": "system:serviceaccount:*:n8n"
                  }
                }
              }]
            }
          - OidcProviderArn:
              Fn::ImportValue: !Sub '${EksStackName}-OidcProviderArn'
            OidcIssuer:
              Fn::Select:
                - 1
                - Fn::Split:
                    - 'https://'
                    - Fn::ImportValue: !Sub '${EksStackName}-OidcIssuerUrl'
      Policies:
        - PolicyName: SecretsManagerReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue       # Read secret value
                  - secretsmanager:DescribeSecret       # Read metadata (name, ARN, tags)
                  - secretsmanager:ListSecretVersionIds # List versions for rotation support
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-secrets-reader-role

Outputs:
  SecretsReaderRoleArn:
    Value: !GetAtt SecretsReaderRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-SecretsReaderRoleArn # annotated on n8n ServiceAccount
