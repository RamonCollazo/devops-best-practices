AWSTemplateFormatVersion: '2010-09-09'
Description: IAM roles for EKS Pod Identity - grants pods cloud permissions without static credentials

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming

  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Deployment environment

Resources:
  # Pod Identity role for n8n pods to read customer secrets from Secrets Manager.
  # Bound to specific secrets via the resource ARN pattern (*-n8n-*); each customer
  # namespace creates a Pod Identity association that binds its service account to this role.
  SecretsReaderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-secrets-reader-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com  # Pod Identity trust principal (not sts.amazonaws.com)
            Action:
              - sts:AssumeRole
              - sts:TagSession  # required for Pod Identity to inject session tags (namespace, service account)
      Policies:
        - PolicyName: SecretsManagerReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:ListSecretVersionIds
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*-n8n-*'
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-secrets-reader-role

Outputs:
  SecretsReaderRoleArn:
    Value: !GetAtt SecretsReaderRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-SecretsReaderRoleArn
