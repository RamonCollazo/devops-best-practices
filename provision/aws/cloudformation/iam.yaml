AWSTemplateFormatVersion: '2010-09-09'
Description: IAM roles for EKS Pod Identity, grants pods cloud permissions without static credentials

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming

  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Deployment environment

Resources:
  # -- Secrets Reader Role --
  # Assumed by app ServiceAccounts (e.g. n8n) via EKS Pod Identity.
  # The Pod Identity Agent on each node exchanges the pod's identity for short-lived
  # AWS credentials — no OIDC provider or SA annotation required.
  # PodIdentityAssociations (one per customer namespace) link this role to the n8n SA.
  # Create associations with: make create-pod-identity-association NAMESPACE=<customer>
  SecretsReaderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-secrets-reader-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: SecretsManagerReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue       # Read secret value
                  - secretsmanager:DescribeSecret       # Read metadata (name, ARN, tags)
                  - secretsmanager:ListSecretVersionIds # List versions for rotation support
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-secrets-reader-role

Outputs:
  SecretsReaderRoleArn:
    Value: !GetAtt SecretsReaderRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-SecretsReaderRoleArn
