AWSTemplateFormatVersion: '2010-09-09'
Description: EKS cluster with OIDC provider

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming

  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Deployment environment

  KubernetesVersion:
    Type: String
    Default: '1.35'
    Description: Kubernetes version for the EKS cluster

  VpcStackName:
    Type: String
    Description: Name of the VPC CloudFormation stack to import values from

  AdminRoleArn:
    Type: String
    Description: >
      IAM principal ARN (role or user) that receives cluster-admin access via an
      EKS Access Entry. For assumed-role sessions pass the role ARN, not the
      assumed-role ARN (e.g. arn:aws:iam::123456789012:role/MyRole).
      Set in Makefile via ADMIN_ROLE_ARN; override with: export ADMIN_ROLE_ARN=<arn>

Resources:
  # -- IAM Role --
  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-eks-cluster-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com  # trust policy says only this service can assume the role
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-eks-cluster-role

  # -- EKS Cluster --
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub ${ProjectName}-${Environment}
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt ClusterRole.Arn
      # Disable the default vpc-cni (aws-node) and kube-proxy self-managed add-ons.
      # Cilium replaces both; installing them first creates a conflict.
      # CoreDNS is a managed add-on and is not affected by this setting.
      BootstrapSelfManagedAddons: false
      # Use the CAM API (Access Entries) instead of the deprecated aws-auth ConfigMap.
      # Setting BootstrapClusterCreatorAdminPermissions to false removes the implicit
      # cluster-admin binding on the deploying identity; all access must be explicit.
      AccessConfig:
        AuthenticationMode: API
        BootstrapClusterCreatorAdminPermissions: false
      ResourcesVpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub '${VpcStackName}-PrivateSubnet1Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PrivateSubnet2Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PrivateSubnet3Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PublicSubnet1Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PublicSubnet2Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PublicSubnet3Id'
        EndpointPublicAccess: true  # Let run kubectl.
        EndpointPrivateAccess: true # Let nodes use endpoint to talk to the API server.
      Logging:
        ClusterLogging:
          EnabledTypes:
            # Minimum needed for security visibility.
            - Type: api
            - Type: audit
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}

  # -- OIDC Provider --
  # Enables IAM Roles for Service Accounts for pods to assume IAM roles without static creds.
  # Needed for CSI driver (n8n SA), CNPG backup, etc.
  OIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      # EKS OIDC endpoints use Amazon-managed certificates.
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280  # Accepted for all EKS clusters across regions.
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-oidc

  # -- EBS CSI Driver --
  # Required for any workload that needs persistent volumes (e.g. CNPG database clusters).
  # The driver runs as a DaemonSet in kube-system and uses IRSA to call EC2/EBS APIs.
  EbsCsiDriverRole:
    Type: AWS::IAM::Role
    DependsOn: OIDCProvider
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-ebs-csi-driver-role
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": { "Federated": "${OidcProviderArn}" },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcIssuer}:sub": "system:serviceaccount:kube-system:ebs-csi-controller-sa",
                    "${OidcIssuer}:aud": "sts.amazonaws.com"
                  }
                }
              }]
            }
          - OidcProviderArn: !Ref OIDCProvider
            OidcIssuer:
              Fn::Select:
                - 1
                - Fn::Split:
                    - 'https://'
                    - !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-ebs-csi-driver-role

  EbsCsiDriverAddon:
    Type: AWS::EKS::Addon
    DependsOn: EbsCsiDriverRole
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: aws-ebs-csi-driver
      ServiceAccountRoleArn: !GetAtt EbsCsiDriverRole.Arn
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-ebs-csi-driver

  # -- Pod Identity Agent --
  # Required for EKS Pod Identity. Runs as a DaemonSet on each node and provides
  # short-lived credentials to pods based on PodIdentityAssociation resources.
  PodIdentityAgentAddon:
    Type: AWS::EKS::Addon
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: eks-pod-identity-agent
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-pod-identity-agent

  # -- Secrets Store CSI Driver Add-on --
  # AWS-managed add-on that installs both the CSI driver and the AWS Secrets Manager provider.
  # Replaces manual Helm installs; AWS handles versioning and security patches.
  # syncSecret enables secretObjects, which creates K8s Secrets from mounted secrets
  # (required for CNPG bootstrap credentials).
  CsiSecretsStoreAddon:
    Type: AWS::EKS::Addon
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: aws-secrets-store-csi-driver-provider
      ResolveConflicts: OVERWRITE
      ConfigurationValues: '{"secrets-store-csi-driver":{"syncSecret":{"enabled":true}}}'
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-csi-secrets-store

  # -- Admin Access Entry --
  # Grants cluster-admin to the principal that deploys this stack (e.g. a CI/CD role
  # or a developer's IAM role). Access Entries replace the aws-auth ConfigMap; they
  # are validated by the AWS API and auditable via CloudTrail without touching kubectl.
  # Additional entries can be added via the EKS console, CLI, or CloudFormation.
  AdminAccessEntry:
    Type: AWS::EKS::AccessEntry
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      PrincipalArn: !Ref AdminRoleArn
      AccessPolicies:
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

Outputs:
  ClusterName:
    Value: !Ref EKSCluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterName

  ClusterArn:
    Value: !GetAtt EKSCluster.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ClusterArn

  ClusterEndpoint:
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub ${AWS::StackName}-ClusterEndpoint

  ClusterSecurityGroupId:
    Value: !GetAtt EKSCluster.ClusterSecurityGroupId
    Export:
      Name: !Sub ${AWS::StackName}-ClusterSecurityGroupId

  OidcProviderArn:
    Value: !Ref OIDCProvider
    Export:
      Name: !Sub ${AWS::StackName}-OidcProviderArn

  OidcIssuerUrl:
    Value: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
    Export:
      Name: !Sub ${AWS::StackName}-OidcIssuerUrl
