AWSTemplateFormatVersion: '2010-09-09'
Description: EKS cluster with OIDC provider, KMS secret encryption, GuardDuty, and managed add-ons

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming

  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Deployment environment

  KubernetesVersion:
    Type: String
    Default: '1.35'
    Description: Kubernetes version for the EKS cluster

  VpcStackName:
    Type: String
    Description: Name of the VPC CloudFormation stack to import values from

  AdminRoleArn:
    Type: String
    Description: >
      IAM principal ARN (role or user) that receives cluster-admin access via an
      EKS Access Entry. For assumed-role sessions pass the role ARN, not the
      assumed-role ARN (e.g. arn:aws:iam::123456789012:role/MyRole).
      Set in Makefile via ADMIN_ROLE_ARN; override with: export ADMIN_ROLE_ARN=<arn>

Resources:
  # KMS key for etcd envelope encryption. Encrypts all Kubernetes Secrets at rest.
  # EnableKeyRotation rotates the key material annually without changing the key ARN.
  EtcdEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub 'EKS etcd secret encryption - ${ProjectName}-${Environment}'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-eks-etcd

  EtcdEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${ProjectName}-${Environment}-eks-etcd'
      TargetKeyId: !Ref EtcdEncryptionKey

  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-eks-cluster-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-eks-cluster-role

  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub ${ProjectName}-${Environment}
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt ClusterRole.Arn
      # Prevents EKS from installing aws-node (VPC CNI) and kube-proxy as self-managed add-ons.
      # Cilium replaces both; if they were present, there would be a CNI conflict.
      BootstrapSelfManagedAddons: false
      AccessConfig:
        AuthenticationMode: API  # API-only mode; no aws-auth ConfigMap, managed entirely via Access Entries
        BootstrapClusterCreatorAdminPermissions: false  # admin access is granted explicitly via AdminAccessEntry below
      EncryptionConfig:
        - Provider:
            KeyArn: !GetAtt EtcdEncryptionKey.Arn
          Resources:
            - secrets  # only Secrets are envelope-encrypted; other resources use EKS-managed encryption
      ResourcesVpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub '${VpcStackName}-PrivateSubnet1Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PrivateSubnet2Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PrivateSubnet3Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PublicSubnet1Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PublicSubnet2Id'
          - Fn::ImportValue: !Sub '${VpcStackName}-PublicSubnet3Id'
        EndpointPublicAccess: true   # allows kubectl from outside the VPC (locked down by IAM, not network)
        EndpointPrivateAccess: true  # nodes and in-cluster components reach the API via private endpoint
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}

  # OIDC provider enables IRSA (IAM Roles for Service Accounts). Required by the EBS CSI driver.
  OIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-oidc

  CoreDnsAddon:
    Type: AWS::EKS::Addon
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: coredns
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-coredns

  # EBS CSI driver uses IRSA (not Pod Identity) because it runs in kube-system before Pod Identity agent starts.
  EbsCsiDriverRole:
    Type: AWS::IAM::Role
    DependsOn: OIDCProvider
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-ebs-csi-driver-role
      AssumeRolePolicyDocument:
        Fn::Sub:
          - |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": { "Federated": "${OidcProviderArn}" },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "${OidcIssuer}:sub": "system:serviceaccount:kube-system:ebs-csi-controller-sa",
                    "${OidcIssuer}:aud": "sts.amazonaws.com"
                  }
                }
              }]
            }
          - OidcProviderArn: !Ref OIDCProvider
            OidcIssuer:
              Fn::Select:
                - 1
                - Fn::Split:
                    - 'https://'
                    - !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-ebs-csi-driver-role

  EbsCsiDriverAddon:
    Type: AWS::EKS::Addon
    DependsOn: EbsCsiDriverRole
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: aws-ebs-csi-driver
      ServiceAccountRoleArn: !GetAtt EbsCsiDriverRole.Arn
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-ebs-csi-driver

  # Pod Identity agent runs as a DaemonSet; intercepts credential requests from pods via a local socket.
  PodIdentityAgentAddon:
    Type: AWS::EKS::Addon
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: eks-pod-identity-agent
      ResolveConflicts: OVERWRITE
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-pod-identity-agent

  # Secrets Store CSI driver with syncSecret enabled so CSI-mounted secrets are also synced as K8s Secrets.
  # The sync is required because CNPG reads the DB credentials from a K8s Secret, not a CSI volume.
  CsiSecretsStoreAddon:
    Type: AWS::EKS::Addon
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      AddonName: aws-secrets-store-csi-driver-provider
      ResolveConflicts: OVERWRITE
      ConfigurationValues: '{"secrets-store-csi-driver":{"syncSecret":{"enabled":true}}}'
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-csi-secrets-store

  # GuardDuty with EKS audit log analysis and runtime monitoring via eBPF agent.
  # EKS_ADDON_MANAGEMENT lets GuardDuty install and upgrade the eBPF agent automatically as an EKS add-on.
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: SIX_HOURS
      Features:
        - Name: EKS_AUDIT_LOGS
          Status: ENABLED
        - Name: EKS_RUNTIME_MONITORING
          Status: ENABLED
          AdditionalConfiguration:
            - Name: EKS_ADDON_MANAGEMENT
              Status: ENABLED

  # Grants cluster-admin to the IAM role/user that runs make deploy-eks.
  # Uses Access Entries (not aws-auth ConfigMap) so cluster access survives ConfigMap corruption.
  AdminAccessEntry:
    Type: AWS::EKS::AccessEntry
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      PrincipalArn: !Ref AdminRoleArn
      AccessPolicies:
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

Outputs:
  ClusterName:
    Value: !Ref EKSCluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterName

  ClusterArn:
    Value: !GetAtt EKSCluster.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ClusterArn

  ClusterEndpoint:
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub ${AWS::StackName}-ClusterEndpoint

  ClusterSecurityGroupId:
    Value: !GetAtt EKSCluster.ClusterSecurityGroupId
    Export:
      Name: !Sub ${AWS::StackName}-ClusterSecurityGroupId

  OidcProviderArn:
    Value: !Ref OIDCProvider
    Export:
      Name: !Sub ${AWS::StackName}-OidcProviderArn

  OidcIssuerUrl:
    Value: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
    Export:
      Name: !Sub ${AWS::StackName}-OidcIssuerUrl

  EtcdEncryptionKeyArn:
    Value: !GetAtt EtcdEncryptionKey.Arn
    Export:
      Name: !Sub ${AWS::StackName}-EtcdEncryptionKeyArn
