AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for CNPG Barman Cloud backups, one bucket per environment

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming

  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Deployment environment

Resources:
  CnpgBackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-cnpg-backups-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireNonCurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30  # matches the Barman retentionPolicy (30d) so the full backup window is recoverable after deletion
          - Id: ExpireOldBackups
            Status: Enabled
            ExpirationInDays: 35  # safety net: 30d retention + 5d buffer for Barman cleanup
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-cnpg-backups-${AWS::AccountId}
        - Key: Environment
          Value: !Ref Environment

  CnpgBackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-cnpg-backup-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: CnpgS3Backup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject  # s3:DeleteObject with versioning creates delete markers only; permanent deletion requires s3:DeleteObjectVersion which is not granted
                Resource: !Sub ${CnpgBackupBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !GetAtt CnpgBackupBucket.Arn
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-cnpg-backup-role

Outputs:
  BucketName:
    Value: !Ref CnpgBackupBucket
    Export:
      Name: !Sub ${AWS::StackName}-BucketName

  BucketArn:
    Value: !GetAtt CnpgBackupBucket.Arn
    Export:
      Name: !Sub ${AWS::StackName}-BucketArn

  CnpgBackupRoleArn:
    Value: !GetAtt CnpgBackupRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-CnpgBackupRoleArn
