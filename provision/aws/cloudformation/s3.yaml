AWSTemplateFormatVersion: '2010-09-09'
Description: S3 bucket for CNPG Barman Cloud backups, one bucket per environment

Parameters:
  ProjectName:
    Type: String
    Description: Project name used for resource naming

  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Deployment environment

Resources:
  CnpgBackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-cnpg-backups-${AWS::AccountId}
      # Block all public access - backups must never be publicly accessible.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # AES-256 encryption at rest with S3-managed keys.
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      # Versioning protects against accidental overwrites or Barman-side deletions.
      # If an object is deleted by mistake, the previous version remains recoverable.
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          # Remove non-current object versions after 30 days.
          # Versioning keeps the previous version of any overwritten/deleted object.
          # CnpgBackupRole only holds s3:DeleteObject (not s3:DeleteObjectVersion), so
          # deletion via a compromised role only creates delete markers - previous versions
          # remain recoverable. 30 days aligns with the Barman retentionPolicy so the
          # full backup window is always recoverable after an accidental or malicious deletion.
          - Id: ExpireNonCurrentVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
          # Hard-expire all objects after 35 days.
          # Barman retention (see ScheduledBackup retentionPolicy: 30d) deletes old
          # backup objects from within the application. This S3 rule is a safety net
          # that catches any orphaned objects Barman fails to clean up, keeping the
          # bucket from growing unbounded. 35 days (30 + 5 buffer) ensures Barman
          # always has a chance to clean up before S3 expires anything.
          - Id: ExpireOldBackups
            Status: Enabled
            ExpirationInDays: 35
          # Clean up incomplete multipart uploads older than 1 day.
          # Large WAL segments are uploaded in parts; failed uploads leave orphaned
          # parts that incur storage charges without contributing usable data.
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-cnpg-backups-${AWS::AccountId}
        - Key: Environment
          Value: !Ref Environment

  # -- CNPG Backup Role --
  # Assumed by the CNPG Cluster ServiceAccount (named after the cluster, e.g. acme-db)
  # via EKS Pod Identity. Scoped exclusively to the backup bucket in this stack.
  # PodIdentityAssociation per customer: make create-cnpg-backup-association NAMESPACE=acme
  CnpgBackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-cnpg-backup-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: CnpgS3Backup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Object-level operations - scoped to this bucket only.
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub ${CnpgBackupBucket.Arn}/*
              # Bucket-level operations - required by Barman for listing and location checks.
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !GetAtt CnpgBackupBucket.Arn
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-cnpg-backup-role

Outputs:
  BucketName:
    Value: !Ref CnpgBackupBucket
    Export:
      Name: !Sub ${AWS::StackName}-BucketName

  BucketArn:
    Value: !GetAtt CnpgBackupBucket.Arn
    Export:
      Name: !Sub ${AWS::StackName}-BucketArn

  CnpgBackupRoleArn:
    Value: !GetAtt CnpgBackupRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-CnpgBackupRoleArn
